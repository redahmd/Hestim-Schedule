{% extends "base.html" %}

{% block title %}Inscription - Hestim Schedule{% endblock %}

{% block content %}
<div class="flex items-center justify-center min-h-[80vh]">
    <div class="w-full max-w-xl bg-white rounded-2xl shadow-xl border border-gray-100 overflow-hidden">
        <div class="p-8 text-center bg-gray-50 border-b border-gray-100">
            <h2 class="text-2xl font-bold text-gray-800">Créer un compte</h2>
            <p class="text-sm text-gray-500 mt-2">Rejoignez Hestim Schedule</p>
        </div>

        <div class="p-8">
            <form method="POST" action="{{ url_for('auth.register') }}" class="space-y-6">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label for="nom" class="block text-sm font-medium text-gray-700 mb-1">Nom</label>
                        <input type="text"
                            class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-red-500 focus:border-red-500 outline-none transition-all"
                            id="nom" name="nom" placeholder="Nom" required>
                    </div>
                    <div>
                        <label for="prenom" class="block text-sm font-medium text-gray-700 mb-1">Prénom</label>
                        <input type="text"
                            class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-red-500 focus:border-red-500 outline-none transition-all"
                            id="prenom" name="prenom" placeholder="Prénom" required>
                    </div>
                </div>

                <div>
                    <label for="email" class="block text-sm font-medium text-gray-700 mb-1">Adresse e-mail</label>
                    <input type="email"
                        class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-red-500 focus:border-red-500 outline-none transition-all"
                        id="email" name="email" placeholder="nom.prenom@exemple.com" required>
                </div>

                <div>
                    <label for="role" class="block text-sm font-medium text-gray-700 mb-1">Rôle</label>
                    <div class="relative">
                        <select
                            class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-red-500 focus:border-red-500 outline-none transition-all appearance-none bg-white"
                            id="role" name="role" required>
                            <option value="etudiant">👨‍🎓 Étudiant</option>
                            <option value="enseignant">👨‍🏫 Enseignant / Professeur</option>
                            <option value="administrateur">👑 Administrateur</option>
                        </select>
                        <div
                            class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-gray-500">
                            <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M19 9l-7 7-7-7"></path>
                            </svg>
                        </div>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Mot de passe</label>
                        <input type="password"
                            class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-red-500 focus:border-red-500 outline-none transition-all"
                            id="password" name="password" placeholder="••••••••" required>
                    </div>
                    <div>
                        <label for="confirm_password"
                            class="block text-sm font-medium text-gray-700 mb-1">Confirmation</label>
                        <input type="password"
                            class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-red-500 focus:border-red-500 outline-none transition-all"
                            id="confirm_password" name="confirm_password" placeholder="••••••••" required>
                    </div>
                </div>

                <button type="submit"
                    class="w-full py-3 px-4 bg-[#da291c] hover:bg-[#b92b23] text-white font-bold rounded-lg shadow-md hover:shadow-lg transition-all transform hover:-translate-y-0.5">
                    S'inscrire
                </button>
            </form>

            <div class="mt-8 pt-6 border-t border-gray-100 text-center">
                <p class="text-sm text-gray-500">
                    Déjà un compte ?
                    <a href="{{ url_for('auth.login') }}" class="text-[#da291c] font-semibold hover:underline">Se
                        connecter</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
