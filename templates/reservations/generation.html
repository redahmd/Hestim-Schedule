{% extends "base.html" %}

{% block title %}Génération d'emploi du temps - Hestim Schedule{% endblock %}

{% block content %}
<div class="mx-auto max-w-4xl px-6 py-10">
    <div class="mb-8 animate-fade-in-up">
        <h1 class="text-3xl font-display font-bold mb-2 text-white [&[data-theme=light]]:text-[#0f172a]">⚡ Génération
            automatique</h1>
        <p class="text-gray-400 [&[data-theme=light]]:text-[#64748b]">Générez automatiquement les emplois du temps
            mensuels en respectant les contraintes.</p>
    </div>

    <div class="glass-card p-8 animate-fade-in-up">
        <div class="grid grid-cols-1 gap-6">
            <!-- Date Selection -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label for="date_debut"
                        class="block text-sm font-semibold mb-2 text-white [&[data-theme=light]]:text-[#0f172a]">Date de
                        début (Génération sur 1 mois)</label>
                    <input type="date" id="date_debut" name="date_debut" required
                        class="w-full px-4 py-3 rounded-xl bg-white/10 border border-white/20 text-white placeholder-gray-400 [&[data-theme=light]]:bg-white [&[data-theme=light]]:border-[#cbd5e1] [&[data-theme=light]]:text-[#0f172a] focus:outline-none focus:ring-2 focus:ring-gold-500 [&[data-theme=light]]:focus:ring-[#3b82f6] transition-all">
                </div>
                <div>
                    <label for="genFiliere"
                        class="block text-sm font-semibold mb-2 text-white [&[data-theme=light]]:text-[#0f172a]">Filière
                        (Optionnel)</label>
                    <select id="genFiliere"
                        class="w-full px-4 py-3 rounded-xl bg-white/10 border border-white/20 text-white [&[data-theme=light]]:bg-white [&[data-theme=light]]:border-[#cbd5e1] [&[data-theme=light]]:text-[#0f172a] focus:outline-none focus:ring-2 focus:ring-gold-500 [&[data-theme=light]]:focus:ring-[#3b82f6] transition-all">
                        <option value="" class="bg-gray-800 text-white">Toutes les filières</option>
                        {% for filiere in filieres %}
                        <option value="{{ filiere }}" class="bg-gray-800 text-white">{{ filiere }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>

            <!-- Additional Filters -->
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div>
                    <label for="genSemestre"
                        class="block text-sm font-semibold mb-2 text-white [&[data-theme=light]]:text-[#0f172a]">Semestre</label>
                    <input id="genSemestre" type="number" min="1" placeholder="ex: 1"
                        class="w-full px-4 py-3 rounded-xl bg-white/10 border border-white/20 text-white [&[data-theme=light]]:bg-white [&[data-theme=light]]:border-[#cbd5e1] [&[data-theme=light]]:text-[#0f172a] focus:outline-none focus:ring-2 focus:ring-gold-500 [&[data-theme=light]]:focus:ring-[#3b82f6] transition-all">
                </div>
                <div>
                    <label for="genGroupeId"
                        class="block text-sm font-semibold mb-2 text-white [&[data-theme=light]]:text-[#0f172a]">ID
                        Groupe (Specific)</label>
                    <input id="genGroupeId" type="number" min="1" placeholder="ex: 12"
                        class="w-full px-4 py-3 rounded-xl bg-white/10 border border-white/20 text-white [&[data-theme=light]]:bg-white [&[data-theme=light]]:border-[#cbd5e1] [&[data-theme=light]]:text-[#0f172a] focus:outline-none focus:ring-2 focus:ring-gold-500 [&[data-theme=light]]:focus:ring-[#3b82f6] transition-all">
                </div>
                <div>
                    <label for="genSeancesParSemaine"
                        class="block text-sm font-semibold mb-2 text-white [&[data-theme=light]]:text-[#0f172a]">Séances
                        / semaine</label>
                    <input id="genSeancesParSemaine" type="number" min="1" max="10" value="1"
                        class="w-full px-4 py-3 rounded-xl bg-white/10 border border-white/20 text-white [&[data-theme=light]]:bg-white [&[data-theme=light]]:border-[#cbd5e1] [&[data-theme=light]]:text-[#0f172a] focus:outline-none focus:ring-2 focus:ring-gold-500 [&[data-theme=light]]:focus:ring-[#3b82f6] transition-all">
                </div>
            </div>

            <!-- Toggles -->
            <div class="flex flex-wrap gap-6 pt-2">
                <label class="inline-flex items-center gap-3 cursor-pointer group">
                    <div class="relative">
                        <input id="genInclureSamedi" type="checkbox" class="peer sr-only" checked>
                        <div
                            class="w-11 h-6 bg-slate-600 border border-slate-500 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:!bg-emerald-500 peer-checked:!border-emerald-500 [&[data-theme=light]]:bg-slate-300 [&[data-theme=light]]:border-slate-400 [&[data-theme=light]]:peer-checked:!bg-emerald-500 [&[data-theme=light]]:peer-checked:!border-emerald-500">
                        </div>
                    </div>
                    <span
                        class="text-sm font-semibold text-white group-hover:text-gold-300 transition-colors [&[data-theme=light]]:text-[#0f172a] [&[data-theme=light]]:group-hover:text-[#3b82f6]">Inclure
                        samedi</span>
                </label>

                <label class="inline-flex items-center gap-3 cursor-pointer group">
                    <div class="relative">
                        <input id="genInclureDimanche" type="checkbox" class="peer sr-only">
                        <div
                            class="w-11 h-6 bg-slate-600 border border-slate-500 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:!bg-emerald-500 peer-checked:!border-emerald-500 [&[data-theme=light]]:bg-slate-300 [&[data-theme=light]]:border-slate-400 [&[data-theme=light]]:peer-checked:!bg-emerald-500 [&[data-theme=light]]:peer-checked:!border-emerald-500">
                        </div>
                    </div>
                    <span
                        class="text-sm font-semibold text-white group-hover:text-gold-300 transition-colors [&[data-theme=light]]:text-[#0f172a] [&[data-theme=light]]:group-hover:text-[#3b82f6]">Inclure
                        dimanche</span>
                </label>

                <label class="inline-flex items-center gap-3 cursor-pointer group">
                    <div class="relative">
                        <input id="genForcerDispo" type="checkbox" class="peer sr-only" checked>
                        <div
                            class="w-11 h-6 bg-slate-600 border border-slate-500 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:!bg-emerald-500 peer-checked:!border-emerald-500 [&[data-theme=light]]:bg-slate-300 [&[data-theme=light]]:border-slate-400 [&[data-theme=light]]:peer-checked:!bg-emerald-500 [&[data-theme=light]]:peer-checked:!border-emerald-500">
                        </div>
                    </div>
                    <span
                        class="text-sm font-semibold text-white group-hover:text-gold-300 transition-colors [&[data-theme=light]]:text-[#0f172a] [&[data-theme=light]]:group-hover:text-[#3b82f6]">Respecter
                        dispo profs</span>
                </label>
            </div>

            <!-- Actions -->
            <div class="flex gap-4 pt-4">
                <button type="button" id="btnSimuler"
                    class="flex-1 px-6 py-3 rounded-xl bg-white/5 border border-white/10 text-white font-semibold hover:bg-white/10 transition-all [&[data-theme=light]]:bg-white [&[data-theme=light]]:border-[#cbd5e1] [&[data-theme=light]]:text-[#0f172a] [&[data-theme=light]]:hover:bg-[#f1f5f9]">
                    🧪 Simuler
                </button>
                <button type="button" id="btnGenerer"
                    class="flex-1 btn-gradient px-6 py-3 font-semibold shadow-lg shadow-gold-700/20 hover:shadow-gold-700/40 transition-all">
                    ⚡ Générer pour 1 mois
                </button>
            </div>
        </div>

        <!-- Result Box -->
        <div id="genResult" class="mt-8 hidden animate-fade-in-up">
            <div
                class="rounded-xl border border-gold-700/20 bg-black/20 p-6 [&[data-theme=light]]:bg-white [&[data-theme=light]]:border-[#cbd5e1]">
                <div class="flex items-center gap-3 mb-4">
                    <div id="resultIcon" class="p-2 rounded-full bg-gold-500/10 text-gold-400">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24"
                            stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
                        </svg>
                    </div>
                    <h3 id="genResultTitle" class="text-xl font-bold text-white [&[data-theme=light]]:text-[#0f172a]">
                    </h3>
                </div>

                <div id="genResultDetails" class="space-y-2 text-gray-300 [&[data-theme=light]]:text-[#475569]"></div>

                <div id="genResultActions" class="mt-6 pt-4 border-t border-white/10 hidden">
                    <a href="{{ url_for('reservations.planning') }}"
                        class="inline-flex items-center gap-2 text-gold-400 hover:text-gold-300 font-medium transition-colors">
                        Voir le planning
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24"
                            stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M17 8l4 4m0 0l-4 4m4-4H3" />
                        </svg>
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    (function () {
        // Set default date to next Monday
        const today = new Date();
        const nextMonday = new Date(today);
        nextMonday.setDate(today.getDate() + (1 + 7 - today.getDay()) % 7 || 7);

        const dateDebutInput = document.getElementById('date_debut');
        // Format YYYY-MM-DD
        const y = nextMonday.getFullYear();
        const m = String(nextMonday.getMonth() + 1).padStart(2, '0');
        const d = String(nextMonday.getDate()).padStart(2, '0');
        dateDebutInput.value = `${y}-${m}-${d}`;

        const resultBox = document.getElementById('genResult');
        const resultTitle = document.getElementById('genResultTitle');
        const resultDetails = document.getElementById('genResultDetails');
        const resultActions = document.getElementById('genResultActions');

        function toIso(d) {
            const y = d.getFullYear();
            const m = String(d.getMonth() + 1).padStart(2, '0');
            const day = String(d.getDate()).padStart(2, '0');
            return `${y}-${m}-${day}`;
        }

        function addDays(d, days) {
            const copy = new Date(d.getTime());
            copy.setDate(copy.getDate() + days);
            return copy;
        }

        function showResult(title, html, isSuccess = false) {
            resultTitle.textContent = title;
            resultDetails.innerHTML = html;
            resultBox.classList.remove('hidden');

            // Adjust icon color based on success/error
            const iconDiv = document.getElementById('resultIcon');
            if (isSuccess) {
                iconDiv.className = 'p-2 rounded-full bg-emerald-500/10 text-emerald-400';
                iconDiv.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>';
            } else {
                iconDiv.className = 'p-2 rounded-full bg-rose-500/10 text-rose-400';
                iconDiv.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" /></svg>';
            }
        }

        function disableButtons(disabled) {
            const btnSimu = document.getElementById('btnSimuler');
            const btnGen = document.getElementById('btnGenerer');

            btnSimu.disabled = disabled;
            btnGen.disabled = disabled;

            if (disabled) {
                btnSimu.classList.add('opacity-50', 'cursor-not-allowed');
                btnGen.classList.add('opacity-50', 'cursor-not-allowed');
                btnGen.textContent = 'Traitement en cours...';
            } else {
                btnSimu.classList.remove('opacity-50', 'cursor-not-allowed');
                btnGen.classList.remove('opacity-50', 'cursor-not-allowed');
                btnGen.textContent = "⚡ Générer pour 1 mois";
            }
        }

        async function callGenerator(dryRun) {
            const startValue = dateDebutInput.value;
            if (!startValue) {
                showResult('Attention', 'Veuillez sélectionner une date de début.');
                return;
            }

            const startDate = new Date(`${startValue}T00:00:00`);
            // Generate for 4 weeks (28 days) or 30 days. Let's do 28 days (4 weeks exactly) for clearer scheduling?
            // The user asked "for a month", so roughly 4 weeks. Let's do 30 days to be safe.
            const endDate = addDays(startDate, 30);

            const seancesParSemaine = Number(document.getElementById('genSeancesParSemaine').value || 1);
            const inclureSamedi = document.getElementById('genInclureSamedi').checked;
            const inclureDimanche = document.getElementById('genInclureDimanche').checked;
            const forcerDispos = document.getElementById('genForcerDispo').checked;
            const semestre = document.getElementById('genSemestre').value;
            const groupeId = document.getElementById('genGroupeId').value;
            const filiere = document.getElementById('genFiliere').value;

            const payload = {
                date_debut: toIso(startDate),
                date_fin: toIso(endDate),
                dry_run: dryRun,
                seances_par_semaine: seancesParSemaine,
                inclure_samedi: inclureSamedi,
                inclure_dimanche: inclureDimanche,
                forcer_disponibilites: forcerDispos,
                filiere: filiere
            };
            if (semestre) payload.semestre = Number(semestre);
            if (groupeId) payload.id_groupe = Number(groupeId);

            disableButtons(true);
            resultBox.classList.add('hidden');
            resultActions.classList.add('hidden');

            try {
                const resp = await fetch("{{ url_for('reservations.generer_emploi_du_temps') }}", {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'same-origin',
                    body: JSON.stringify(payload),
                });

                const data = await resp.json().catch(() => null);

                if (!resp.ok || !data) {
                    showResult('Erreur', (data && data.message) ? data.message : `Erreur serveur (${resp.status})`);
                    return;
                }

                if (!data.ok) {
                    showResult('Erreur', data.message || 'Une erreur inconnue est survenue.');
                    return;
                }

                // Success
                const unscheduled = Array.isArray(data.unscheduled) ? data.unscheduled : [];
                let html = `
                    <div class="grid grid-cols-2 gap-4 mb-4">
                        <div class="p-4 rounded-lg bg-emerald-500/10 border border-emerald-500/20 text-center">
                            <div class="text-2xl font-bold text-emerald-400">${data.created}</div>
                            <div class="text-xs uppercase tracking-wider text-emerald-300/70">Créneaux créés</div>
                        </div>
                        <div class="p-4 rounded-lg bg-white/5 border border-white/10 text-center">
                            <div class="text-2xl font-bold text-white [&[data-theme=light]]:text-[#0f172a]">${unscheduled.length}</div>
                            <div class="text-xs uppercase tracking-wider text-gray-400">Non planifiés</div>
                        </div>
                    </div>
                    <div class="text-sm">
                        <span class="text-gray-400">Période :</span> 
                        <span class="text-white font-medium [&[data-theme=light]]:text-[#0f172a]">${data.date_debut} au ${data.date_fin}</span>
                    </div>
                `;

                if (unscheduled.length > 0) {
                    html += `
                        <div class="mt-4 pt-4 border-t border-white/10">
                            <p class="font-semibold text-rose-400 mb-2">Cours non planifiés :</p>
                            <ul class="space-y-1 text-sm text-gray-400 custom-scrollbar max-h-40 overflow-y-auto">
                                ${unscheduled.map(u => `
                                    <li class="flex items-start gap-2">
                                        <span class="text-rose-400">•</span>
                                        <span><strong class="text-white [&[data-theme=light]]:text-[#0f172a]">${u.code_cours || ''}</strong>: ${u.message}</span>
                                    </li>
                                `).join('')}
                            </ul>
                        </div>
                    `;
                }

                showResult(
                    data.dry_run ? 'Résultat de la simulation' : 'Génération réussie !',
                    html,
                    true
                );

                if (!data.dry_run) {
                    resultActions.classList.remove('hidden');
                }

            } catch (e) {
                console.error(e);
                showResult('Erreur critique', 'Impossible de contacter le serveur. Vérifiez votre connexion.');
            } finally {
                disableButtons(false);
            }
        }

        document.getElementById('btnSimuler').addEventListener('click', () => callGenerator(true));
        document.getElementById('btnGenerer').addEventListener('click', () => callGenerator(false));
    })();
</script>
{% endblock %}
