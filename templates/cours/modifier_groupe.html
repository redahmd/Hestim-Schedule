{% extends "base.html" %}

{% block title %}Modifier un groupe - Hestim Schedule{% endblock %}

{% block content %}
<div class="mx-auto max-w-3xl px-6 py-10">
    <div class="mb-8 animate-fade-in-up">
        <a href="{{ url_for('cours.liste_groupes') }}"
            class="text-gray-400 hover:text-white transition-colors mb-4 inline-flex items-center gap-2 [&[data-theme=light]]:text-[#64748b] [&[data-theme=light]]:hover:text-[#0f172a]">
            <span>←</span> Retour à la liste
        </a>
        <h1 class="text-3xl font-display font-bold mb-2 text-white [&[data-theme=light]]:text-[#0f172a]">✏️ Modifier le
            groupe {{ groupe.nom_groupe }}</h1>
        <p class="text-gray-400 [&[data-theme=light]]:text-[#64748b]">Mettez à jour les informations du groupe.</p>
    </div>

    <div class="glass-card p-6 animate-fade-in-up">
        <form method="POST" action="{{ url_for('cours.modifier_groupe', id=groupe.id_groupe) }}" class="space-y-6">

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <!-- Nom et Niveau -->
                <div>
                    <label for="nom_groupe"
                        class="block text-sm font-semibold mb-2 text-white [&[data-theme=light]]:text-[#0f172a]">Nom du
                        groupe *</label>
                    <input type="text" id="nom_groupe" name="nom_groupe" value="{{ groupe.nom_groupe }}" required
                        class="w-full px-4 py-2 rounded-lg bg-white/10 border border-white/20 text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-gold-500 [&[data-theme=light]]:bg-white [&[data-theme=light]]:border-[#cbd5e1] [&[data-theme=light]]:text-[#0f172a] [&[data-theme=light]]:placeholder-[#94a3b8] [&[data-theme=light]]:focus:ring-[#3b82f6]">
                </div>
                <div>
                    <label for="niveau"
                        class="block text-sm font-semibold mb-2 text-white [&[data-theme=light]]:text-[#0f172a]">Niveau
                        *</label>
                    <select id="niveau" name="niveau" required
                        class="w-full px-4 py-2 rounded-lg bg-white/10 border border-white/20 text-white focus:outline-none focus:ring-2 focus:ring-gold-500 [&[data-theme=light]]:bg-white [&[data-theme=light]]:border-[#cbd5e1] [&[data-theme=light]]:text-[#0f172a] [&[data-theme=light]]:focus:ring-[#3b82f6]">
                        <option value="Licence 1" {% if groupe.niveau=='Licence 1' %}selected{% endif %}
                            class="text-gray-900">Licence 1</option>
                        <option value="Licence 2" {% if groupe.niveau=='Licence 2' %}selected{% endif %}
                            class="text-gray-900">Licence 2</option>
                        <option value="Licence 3" {% if groupe.niveau=='Licence 3' %}selected{% endif %}
                            class="text-gray-900">Licence 3</option>
                        <option value="Master 1" {% if groupe.niveau=='Master 1' %}selected{% endif %}
                            class="text-gray-900">Master 1</option>
                        <option value="Master 2" {% if groupe.niveau=='Master 2' %}selected{% endif %}
                            class="text-gray-900">Master 2</option>
                    </select>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <!-- Filière, Effectif, Année -->
                <div>
                    <label for="filiere"
                        class="block text-sm font-semibold mb-2 text-white [&[data-theme=light]]:text-[#0f172a]">Filière</label>
                    <input type="text" id="filiere" name="filiere" value="{{ groupe.filiere or '' }}"
                        class="w-full px-4 py-2 rounded-lg bg-white/10 border border-white/20 text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-gold-500 [&[data-theme=light]]:bg-white [&[data-theme=light]]:border-[#cbd5e1] [&[data-theme=light]]:text-[#0f172a] [&[data-theme=light]]:placeholder-[#94a3b8] [&[data-theme=light]]:focus:ring-[#3b82f6]">
                </div>
                <div>
                    <label for="effectif"
                        class="block text-sm font-semibold mb-2 text-white [&[data-theme=light]]:text-[#0f172a]">Effectif
                        *</label>
                    <input type="number" id="effectif" name="effectif" value="{{ groupe.effectif }}" required min="1"
                        class="w-full px-4 py-2 rounded-lg bg-white/10 border border-white/20 text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-gold-500 [&[data-theme=light]]:bg-white [&[data-theme=light]]:border-[#cbd5e1] [&[data-theme=light]]:text-[#0f172a] [&[data-theme=light]]:placeholder-[#94a3b8] [&[data-theme=light]]:focus:ring-[#3b82f6]">
                </div>
                <div>
                    <label for="annee_academique"
                        class="block text-sm font-semibold mb-2 text-white [&[data-theme=light]]:text-[#0f172a]">Année
                        académique</label>
                    <input type="text" id="annee_academique" name="annee_academique"
                        value="{{ groupe.annee_academique or '' }}"
                        class="w-full px-4 py-2 rounded-lg bg-white/10 border border-white/20 text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-gold-500 [&[data-theme=light]]:bg-white [&[data-theme=light]]:border-[#cbd5e1] [&[data-theme=light]]:text-[#0f172a] [&[data-theme=light]]:placeholder-[#94a3b8] [&[data-theme=light]]:focus:ring-[#3b82f6]"
                        placeholder="Ex: 2023-2024">
                </div>
            </div>

            <div
                class="flex items-center justify-between pt-4 border-t border-white/10 [&[data-theme=light]]:border-[#cbd5e1]">
                <button type="button" onclick="confirmDelete()"
                    class="px-6 py-2 rounded-lg border border-red-500/20 text-red-400 hover:bg-red-500/10 transition-colors [&[data-theme=light]]:border-red-500/30 [&[data-theme=light]]:text-red-600 [&[data-theme=light]]:hover:bg-red-50">
                    🗑️ Supprimer
                </button>

                <div class="flex gap-4">
                    <a href="{{ url_for('cours.liste_groupes') }}"
                        class="px-6 py-2 rounded-lg border border-white/20 text-white hover:bg-white/10 transition-colors [&[data-theme=light]]:border-[#cbd5e1] [&[data-theme=light]]:text-[#64748b] [&[data-theme=light]]:hover:bg-gray-100">
                        Annuler
                    </a>
                    <button type="submit" class="btn-gradient px-6 py-2 cursor-pointer">
                        Enregistrer
                    </button>
                </div>
            </div>
        </form>

        <!-- Formulaire de suppression caché -->
        <form id="delete-form" action="{{ url_for('cours.supprimer_groupe', id=groupe.id_groupe) }}" method="POST"
            class="hidden"></form>
    </div>
</div>

<script>
    function confirmDelete() {
        if (confirm('Êtes-vous sûr de vouloir supprimer ce groupe ?\nAttention: cela peut échouer si le groupe est lié à des étudiants ou des cours. Supprimez d\'abord les éléments liés.')) {
            document.getElementById('delete-form').submit();
        }
    }
</script>
{% endblock %}
