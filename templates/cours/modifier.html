{% extends "base.html" %}

{% block title %}Modifier un cours - Hestim Schedule{% endblock %}

{% block content %}
<div class="mx-auto max-w-3xl px-6 py-10">
    <div class="mb-8 animate-fade-in-up">
        <a href="{{ url_for('cours.liste') }}"
            class="text-gray-400 hover:text-white transition-colors mb-4 inline-flex items-center gap-2 [&[data-theme=light]]:text-[#64748b] [&[data-theme=light]]:hover:text-[#0f172a]">
            <span>←</span> Retour à la liste
        </a>
        <h1 class="text-3xl font-display font-bold mb-2 text-white [&[data-theme=light]]:text-[#0f172a]">✏️ Modifier le
            cours {{ cours.code_cours }}</h1>
        <p class="text-gray-400 [&[data-theme=light]]:text-[#64748b]">Mettez à jour les informations du cours.</p>
    </div>

    <div class="glass-card p-6 animate-fade-in-up">
        <form method="POST" action="{{ url_for('cours.modifier', id=cours.id_cours) }}" class="space-y-6">

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <!-- Nom et Type -->
                <div>
                    <label for="nom_cours"
                        class="block text-sm font-semibold mb-2 text-white [&[data-theme=light]]:text-[#0f172a]">Nom du
                        cours *</label>
                    <input type="text" id="nom_cours" name="nom_cours" value="{{ cours.nom_cours }}" required
                        class="w-full px-4 py-2 rounded-lg bg-white/10 border border-white/20 text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-gold-500 [&[data-theme=light]]:bg-white [&[data-theme=light]]:border-[#cbd5e1] [&[data-theme=light]]:text-[#0f172a] [&[data-theme=light]]:placeholder-[#94a3b8] [&[data-theme=light]]:focus:ring-[#3b82f6]">
                </div>
                <div>
                    <label for="type_cours"
                        class="block text-sm font-semibold mb-2 text-white [&[data-theme=light]]:text-[#0f172a]">Type de
                        cours *</label>
                    <select id="type_cours" name="type_cours" required
                        class="w-full px-4 py-2 rounded-lg bg-white/10 border border-white/20 text-white focus:outline-none focus:ring-2 focus:ring-gold-500 [&[data-theme=light]]:bg-white [&[data-theme=light]]:border-[#cbd5e1] [&[data-theme=light]]:text-[#0f172a] [&[data-theme=light]]:focus:ring-[#3b82f6]">
                        <option value="CM" {% if cours.type_cours=='CM' %}selected{% endif %} class="text-gray-900">CM
                        </option>
                        <option value="TD" {% if cours.type_cours=='TD' %}selected{% endif %} class="text-gray-900">TD
                        </option>
                        <option value="TP" {% if cours.type_cours=='TP' %}selected{% endif %} class="text-gray-900">TP
                        </option>
                        <option value="projet" {% if cours.type_cours=='projet' %}selected{% endif %}
                            class="text-gray-900">Projet</option>
                        <option value="examen" {% if cours.type_cours=='examen' %}selected{% endif %}
                            class="text-gray-900">Examen</option>
                    </select>
                </div>
            </div>

            <!-- Prof, Groupe, Heures -->
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div>
                    <label for="id_professeur"
                        class="block text-sm font-semibold mb-2 text-white [&[data-theme=light]]:text-[#0f172a]">Professeur
                        *</label>
                    <select id="id_professeur" name="id_professeur" required
                        class="w-full px-4 py-2 rounded-lg bg-white/10 border border-white/20 text-white focus:outline-none focus:ring-2 focus:ring-gold-500 [&[data-theme=light]]:bg-white [&[data-theme=light]]:border-[#cbd5e1] [&[data-theme=light]]:text-[#0f172a] [&[data-theme=light]]:focus:ring-[#3b82f6]">
                        {% for prof in professeurs %}
                        <option value="{{ prof.id_professeur }}" {% if cours.id_professeur==prof.id_professeur
                            %}selected{% endif %} class="text-gray-900">
                            {{ prof.prenom }} {{ prof.nom }}
                        </option>
                        {% endfor %}
                    </select>
                </div>
                <div>
                    <label for="id_groupe"
                        class="block text-sm font-semibold mb-2 text-white [&[data-theme=light]]:text-[#0f172a]">Groupe
                        *</label>
                    <select id="id_groupe" name="id_groupe" required
                        class="w-full px-4 py-2 rounded-lg bg-white/10 border border-white/20 text-white focus:outline-none focus:ring-2 focus:ring-gold-500 [&[data-theme=light]]:bg-white [&[data-theme=light]]:border-[#cbd5e1] [&[data-theme=light]]:text-[#0f172a] [&[data-theme=light]]:focus:ring-[#3b82f6]">
                        {% for grp in groupes %}
                        <option value="{{ grp.id_groupe }}" {% if cours.id_groupe==grp.id_groupe %}selected{% endif %}
                            class="text-gray-900">
                            {{ grp.nom_groupe }}
                        </option>
                        {% endfor %}
                    </select>
                </div>
                <div>
                    <label for="nombre_heures"
                        class="block text-sm font-semibold mb-2 text-white [&[data-theme=light]]:text-[#0f172a]">Nombre
                        d'heures *</label>
                    <input type="number" id="nombre_heures" name="nombre_heures" value="{{ cours.nombre_heures }}"
                        required min="1"
                        class="w-full px-4 py-2 rounded-lg bg-white/10 border border-white/20 text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-gold-500 [&[data-theme=light]]:bg-white [&[data-theme=light]]:border-[#cbd5e1] [&[data-theme=light]]:text-[#0f172a] [&[data-theme=light]]:placeholder-[#94a3b8] [&[data-theme=light]]:focus:ring-[#3b82f6]">
                </div>
            </div>

            <!-- Semestre et Coeff -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label for="semestre"
                        class="block text-sm font-semibold mb-2 text-white [&[data-theme=light]]:text-[#0f172a]">Semestre</label>
                    <input type="number" id="semestre" name="semestre" value="{{ cours.semestre or '' }}" min="1"
                        class="w-full px-4 py-2 rounded-lg bg-white/10 border border-white/20 text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-gold-500 [&[data-theme=light]]:bg-white [&[data-theme=light]]:border-[#cbd5e1] [&[data-theme=light]]:text-[#0f172a] [&[data-theme=light]]:placeholder-[#94a3b8] [&[data-theme=light]]:focus:ring-[#3b82f6]">
                </div>
                <div>
                    <label for="coefficient"
                        class="block text-sm font-semibold mb-2 text-white [&[data-theme=light]]:text-[#0f172a]">Coefficient</label>
                    <input type="number" step="0.1" id="coefficient" name="coefficient"
                        value="{{ cours.coefficient or '' }}"
                        class="w-full px-4 py-2 rounded-lg bg-white/10 border border-white/20 text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-gold-500 [&[data-theme=light]]:bg-white [&[data-theme=light]]:border-[#cbd5e1] [&[data-theme=light]]:text-[#0f172a] [&[data-theme=light]]:placeholder-[#94a3b8] [&[data-theme=light]]:focus:ring-[#3b82f6]">
                </div>
            </div>

            <div
                class="flex items-center justify-between pt-4 border-t border-white/10 [&[data-theme=light]]:border-[#cbd5e1]">
                <button type="button" onclick="confirmDelete()"
                    class="px-6 py-2 rounded-lg border border-red-500/20 text-red-400 hover:bg-red-500/10 transition-colors [&[data-theme=light]]:border-red-500/30 [&[data-theme=light]]:text-red-600 [&[data-theme=light]]:hover:bg-red-50">
                    🗑️ Supprimer
                </button>

                <div class="flex gap-4">
                    <a href="{{ url_for('cours.liste') }}"
                        class="px-6 py-2 rounded-lg border border-white/20 text-white hover:bg-white/10 transition-colors [&[data-theme=light]]:border-[#cbd5e1] [&[data-theme=light]]:text-[#64748b] [&[data-theme=light]]:hover:bg-gray-100">
                        Annuler
                    </a>
                    <button type="submit" class="btn-gradient px-6 py-2 cursor-pointer">
                        Enregistrer
                    </button>
                </div>
            </div>
        </form>

        <!-- Formulaire de suppression caché -->
        <form id="delete-form" action="{{ url_for('cours.supprimer', id=cours.id_cours) }}" method="POST"
            class="hidden"></form>
    </div>
</div>

<script>
    function confirmDelete() {
        if (confirm('Êtes-vous sûr de vouloir supprimer ce cours ?')) {
            document.getElementById('delete-form').submit();
        }
    }
</script>
{% endblock %}
